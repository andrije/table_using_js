<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Table</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <div class="container">
      <div id="btnContainer">
        <button id="add">Добавить</button>
        <button id="delete">Удалить</button>
        <button id="fun">красная кнопка</button>
      </div>

      <div id="tableContainer">
        <table>
          <thead id="tableHead">
            <tr>
              <th id="class-name">Class name</th>
              <th id="type">Type</th>
              <th id="hours">Hours</th>
              <th id="trainer">Trainer</th>
              <th id="spots">Spots</th>
              <th id="spots"><button id="remove">+</button></th>
            </tr>
          </thead>
          <tbody id="table"></tbody>
        </table>
      </div>
    </div>
  </body>
</html>
